<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Canada Trip</title>
  <meta name="description" content="Wildlife sightings and travel companion for the Canada road trip" />
  <meta name="theme-color" content="#2d6a4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Canada Trip" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:   #2d6a4f;
      --green-d: #1b4332;
      --green-l: #52b788;
      --amber:   #d4a017;
      --amber-l: #f0c040;
      --cream:   #fdf6ec;
      --cream-d: #f0e6d3;
      --text:    #1a1a1a;
      --text-m:  #555;
      --radius:  14px;
      --shadow:  0 2px 12px rgba(0,0,0,.10);
      --shadow-l:0 1px 4px rgba(0,0,0,.07);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--cream);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; border: none; background: none; font: inherit; }
    input, textarea, select { font: inherit; }

    /* ── Utility ── */
    .hidden { display: none !important; }
    .flex { display: flex; }
    .col { flex-direction: column; }
    .gap8 { gap: 8px; }
    .gap12 { gap: 12px; }
    .center { align-items: center; justify-content: center; }
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    /* ── Screens ── */
    .screen {
      position: fixed; inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Auth ── */
    #auth-screen {
      background: linear-gradient(160deg, var(--green-d) 0%, var(--green) 60%, var(--green-l) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
      padding-top: calc(var(--safe-top) + 24px);
    }
    .auth-logo {
      font-size: 72px; line-height: 1; margin-bottom: 8px;
    }
    .auth-title {
      color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px;
    }
    .auth-subtitle {
      color: rgba(255,255,255,.7); font-size: 15px; margin-bottom: 40px; text-align: center;
    }
    .profile-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 360px;
    }
    .profile-btn {
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.3);
      border-radius: var(--radius);
      padding: 16px 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      backdrop-filter: blur(8px);
      transition: all .15s;
    }
    .profile-btn:active { transform: scale(.96); background: rgba(255,255,255,.25); }
    .profile-btn .avatar { font-size: 32px; margin-bottom: 6px; }

    /* PIN entry */
    .pin-panel {
      width: 100%; max-width: 320px; margin-top: 24px;
    }
    .pin-label { color: rgba(255,255,255,.9); font-size: 14px; text-align: center; margin-bottom: 12px; }
    .pin-dots {
      display: flex; justify-content: center; gap: 16px; margin-bottom: 20px;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.6);
      background: transparent;
      transition: background .15s;
    }
    .pin-dot.filled { background: var(--amber-l); border-color: var(--amber-l); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 50%;
      width: 64px; height: 64px;
      margin: auto;
      color: #fff; font-size: 22px; font-weight: 600;
      transition: all .1s;
    }
    .pin-key:active { background: rgba(255,255,255,.35); transform: scale(.93); }
    .pin-key.del { font-size: 18px; }
    .pin-error { color: var(--amber-l); font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
    .back-btn {
      color: rgba(255,255,255,.7); font-size: 14px; margin-top: 16px; text-decoration: underline;
    }

    /* ── Main app shell ── */
    #app-screen { background: var(--cream); }

    /* Top bar */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--green-d);
      color: #fff;
      padding: 12px 16px;
      padding-top: calc(var(--safe-top) + 12px);
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
    .topbar-sub { font-size: 12px; color: rgba(255,255,255,.6); }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      transition: background .15s;
      flex-shrink: 0;
    }
    .icon-btn:active { background: rgba(255,255,255,.15); }

    /* Tab bar */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: #fff;
      border-top: 1px solid #e8e0d5;
      display: flex;
      padding-bottom: var(--safe-bot);
      box-shadow: 0 -2px 12px rgba(0,0,0,.08);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 10px 8px;
      color: var(--text-m); font-size: 11px; font-weight: 600;
      gap: 4px; transition: color .15s;
    }
    .tab-btn .tab-icon { font-size: 22px; }
    .tab-btn.active { color: var(--green); }
    .tab-btn.active .tab-icon { filter: drop-shadow(0 0 3px rgba(45,106,79,.4)); }

    /* Page content area */
    .page-content {
      padding: 16px;
      padding-bottom: calc(var(--safe-bot) + 80px);
    }

    /* ── Wildlife tab ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title { font-size: 16px; font-weight: 700; color: var(--green-d); }

    /* Summary chips */
    .species-summary {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    }
    .species-chip {
      background: var(--cream-d);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      border: 1px solid #e0d8cc;
    }
    .species-chip .chip-count {
      background: var(--green);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 12px;
    }

    /* Sighting cards */
    .sighting-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow-l);
      padding: 14px;
      margin-bottom: 10px;
      border-left: 4px solid var(--green-l);
    }
    .sighting-card .animal-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .sighting-card .animal-name { font-size: 16px; font-weight: 700; }
    .sighting-card .animal-emoji { font-size: 22px; }
    .sighting-meta { font-size: 12px; color: var(--text-m); display: flex; flex-wrap: wrap; gap: 8px; }
    .sighting-meta span { display: flex; align-items: center; gap: 3px; }
    .sighting-notes { font-size: 13px; color: var(--text-m); margin-top: 8px; font-style: italic; }

    /* FAB */
    .fab {
      position: fixed; right: 20px;
      bottom: calc(var(--safe-bot) + 76px);
      z-index: 90;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--amber);
      color: #fff;
      font-size: 28px;
      box-shadow: 0 4px 16px rgba(212,160,23,.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .15s;
    }
    .fab:active { transform: scale(.93); box-shadow: 0 2px 8px rgba(212,160,23,.4); }

    /* ── Directory tab ── */
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      border: 1.5px solid var(--green-l);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px; font-weight: 600; color: var(--green);
      background: #fff;
      transition: all .15s;
    }
    .filter-chip.active { background: var(--green); color: #fff; border-color: var(--green); }

    .dir-city-header {
      font-size: 13px; font-weight: 700; color: var(--text-m);
      text-transform: uppercase; letter-spacing: .06em;
      margin: 16px 0 8px;
    }
    .dir-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow-l);
      padding: 14px;
      margin-bottom: 10px;
    }
    .dir-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .dir-card-icon { font-size: 26px; flex-shrink: 0; }
    .dir-card-name { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .dir-card-cat { font-size: 12px; color: var(--text-m); margin-top: 2px; }
    .dir-card-meta { font-size: 12px; color: var(--text-m); display: flex; flex-wrap: wrap; gap: 8px; }
    .stars { color: var(--amber); font-size: 14px; }
    .dir-card-notes { font-size: 13px; color: var(--text-m); margin-top: 8px; font-style: italic; }

    /* ── Modal / Sheet ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: flex; align-items: flex-end;
      padding: 0;
      animation: fadeIn .2s;
    }
    .modal-overlay.center-modal { align-items: center; padding: 24px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      background: #fff;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 20px 20px;
      padding-bottom: calc(var(--safe-bot) + 20px);
      animation: slideUp .25s cubic-bezier(.25,.8,.25,1);
    }
    .sheet.center-sheet { border-radius: 20px; max-height: 80vh; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: .6; } to { transform: none; opacity: 1; } }
    .sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: #ddd; margin: 0 auto 16px;
    }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--green-d); }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-m); margin-bottom: 5px; display: block; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      background: var(--cream);
      color: var(--text);
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--green-l);
    }
    .form-textarea { min-height: 80px; resize: vertical; }
    .star-picker { display: flex; gap: 8px; }
    .star-btn { font-size: 28px; opacity: .3; transition: opacity .1s; }
    .star-btn.active { opacity: 1; }

    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--green);
      color: #fff;
      border-radius: 12px;
      font-size: 16px; font-weight: 700;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn-primary:active { background: var(--green-d); }
    .btn-secondary {
      width: 100%; padding: 13px;
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 12px;
      font-size: 15px; font-weight: 700;
      margin-top: 8px;
    }

    .location-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-m); margin-top: 4px;
    }
    .loc-status { flex: 1; }

    /* Settings sheet */
    .settings-item {
      display: flex; align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--cream-d);
      gap: 12px; font-size: 15px;
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-icon { font-size: 22px; width: 32px; text-align: center; }
    .settings-label { flex: 1; }
    .settings-value { font-size: 14px; color: var(--text-m); }

    /* Offline banner */
    #offline-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      background: var(--amber);
      color: var(--green-d);
      text-align: center;
      padding: 8px 16px;
      font-size: 13px; font-weight: 700;
      transform: translateY(-100%);
      transition: transform .3s;
    }
    #offline-banner.visible { transform: translateY(0); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--text-m);
    }
    .empty-state .empty-icon { font-size: 56px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* Toast */
    #toast {
      position: fixed; bottom: calc(var(--safe-bot) + 90px); left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--green-d);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px; font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (min-width: 480px) {
      .profile-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- Offline banner -->
<div id="offline-banner">📡 You're offline — changes will sync when reconnected</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ══════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════ -->
<div id="auth-screen" class="screen">
  <div class="auth-logo">🍁</div>
  <div class="auth-title">Canada Trip</div>
  <div class="auth-subtitle">Who's exploring today?</div>

  <div id="profile-picker" class="profile-grid">
    <!-- Populated by JS -->
  </div>

  <div id="pin-panel" class="pin-panel hidden">
    <div class="pin-label" id="pin-label">Enter PIN for <strong id="pin-user-name"></strong></div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" onclick="pinKey('clear')">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinKey('del')">✕</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <button class="back-btn" onclick="showProfilePicker()">← Back</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     MAIN APP SCREEN
══════════════════════════════════════ -->
<div id="app-screen" class="screen hidden">

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Canada Trip 🍁</div>
      <div class="topbar-sub" id="topbar-sub"></div>
    </div>
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>

  <!-- Wildlife page -->
  <div id="page-wildlife" class="page-content">
    <div class="section-header">
      <div class="section-title">Species Tally</div>
    </div>
    <div class="species-summary" id="species-summary"></div>

    <div class="section-header">
      <div class="section-title">Sightings</div>
    </div>
    <div id="sightings-list"></div>
  </div>

  <!-- Directory page -->
  <div id="page-directory" class="page-content hidden">
    <div class="filter-row" id="city-filters"></div>
    <div class="filter-row" id="cat-filters"></div>
    <div id="directory-list"></div>
  </div>

  <!-- Tab bar -->
  <nav class="tabbar">
    <button class="tab-btn active" id="tab-wildlife" onclick="switchTab('wildlife')">
      <span class="tab-icon">🐻</span>Wildlife
    </button>
    <button class="tab-btn" id="tab-directory" onclick="switchTab('directory')">
      <span class="tab-icon">📍</span>Directory
    </button>
  </nav>

  <!-- FAB (shown per tab) -->
  <button class="fab" id="fab" onclick="openAddModal()">＋</button>
</div>

<!-- ══════════════════════════════════════
     ADD SIGHTING MODAL
══════════════════════════════════════ -->
<div id="modal-sighting" class="modal-overlay hidden" onclick="closeOnOverlay(event,'modal-sighting')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Log a Sighting 🐾</div>
    <div class="form-group">
      <label class="form-label">Animal</label>
      <select class="form-select" id="s-animal">
        <option value="">Select animal…</option>
      </select>
    </div>
    <div class="form-group" id="s-other-group" style="display:none">
      <label class="form-label">Specify Animal</label>
      <input class="form-input" id="s-other" placeholder="e.g. Wolverine" />
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="s-notes" placeholder="What were they doing? How many?"></textarea>
    </div>
    <div class="location-row">
      <span>📍</span>
      <span class="loc-status" id="s-loc-status">Fetching location…</span>
    </div>
    <button class="btn-primary" onclick="submitSighting()">Log Sighting</button>
    <button class="btn-secondary" onclick="closeModal('modal-sighting')">Cancel</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     ADD DIRECTORY ENTRY MODAL
══════════════════════════════════════ -->
<div id="modal-directory" class="modal-overlay hidden" onclick="closeOnOverlay(event,'modal-directory')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add a Place 📍</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="d-name" placeholder="e.g. Tim Hortons" />
    </div>
    <div class="form-group">
      <label class="form-label">City</label>
      <select class="form-select" id="d-city"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="d-cat"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Address (optional)</label>
      <input class="form-input" id="d-address" placeholder="Street address or area" />
    </div>
    <div class="form-group">
      <label class="form-label">Rating</label>
      <div class="star-picker" id="d-stars">
        <button class="star-btn" data-v="1" onclick="setStar(1)">⭐</button>
        <button class="star-btn" data-v="2" onclick="setStar(2)">⭐</button>
        <button class="star-btn" data-v="3" onclick="setStar(3)">⭐</button>
        <button class="star-btn" data-v="4" onclick="setStar(4)">⭐</button>
        <button class="star-btn" data-v="5" onclick="setStar(5)">⭐</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="d-notes" placeholder="Tips, recommendations, warnings…"></textarea>
    </div>
    <button class="btn-primary" onclick="submitDirectory()">Add Place</button>
    <button class="btn-secondary" onclick="closeModal('modal-directory')">Cancel</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     SETTINGS MODAL
══════════════════════════════════════ -->
<div id="modal-settings" class="modal-overlay hidden" onclick="closeOnOverlay(event,'modal-settings')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Settings ⚙️</div>
    <div class="settings-item">
      <span class="settings-icon">👤</span>
      <span class="settings-label">Signed in as</span>
      <span class="settings-value" id="settings-user"></span>
    </div>
    <div class="settings-item" onclick="switchUser()" style="cursor:pointer">
      <span class="settings-icon">🔄</span>
      <span class="settings-label">Switch User</span>
    </div>
    <div class="settings-item">
      <span class="settings-icon">☁️</span>
      <span class="settings-label">Sync status</span>
      <span class="settings-value" id="settings-sync">—</span>
    </div>
    <div class="settings-item">
      <span class="settings-icon">📦</span>
      <span class="settings-label">Offline queue</span>

// ═══════════════════════════════════════════════════════
//  OFFLINE QUEUE (IndexedDB)
// ═══════════════════════════════════════════════════════
const IDB_NAME = 'canada-trip-queue';
const IDB_STORE = 'writes';
let idb;

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { autoIncrement: true });
    req.onsuccess = e => { idb = e.target.result; resolve(idb); };
    req.onerror = e => reject(e);
  });
}

function idbPut(item) {
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).add(item).onsuccess = e => resolve(e.target.result);
    tx.onerror = reject;
  });
}

function idbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = reject;
  });
}

function idbGetAllKeys() {
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).getAllKeys();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = reject;
  });
}

function idbDelete(key) {
  return new Promise((resolve, reject) => {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key).onsuccess = resolve;
    tx.onerror = reject;
  });
}

async function flushQueue() {
  const items = await idbGetAll();
  const keys  = await idbGetAllKeys();
  for (let i = 0; i < items.length; i++) {
    try {
      const { collection, data } = items[i];
      await db.collection(collection).add(data);
      await idbDelete(keys[i]);
    } catch {}
  }
  updateQueueCount();
}

async function updateQueueCount() {
  const items = await idbGetAll();
  const el = document.getElementById('settings-queue');
  if (el) el.textContent = items.length + ' pending';
}

let isOnline = navigator.onLine;

function setOnline(v) {
  isOnline = v;
  const banner = document.getElementById('offline-banner');
  banner.classList.toggle('visible', !v);

  if (syncEl) syncEl.textContent = v ? '✅ Online' : '⚠️ Offline';
  if (v) flushQueue();
}

window.addEventListener('online',  () => setOnline(true));

//  AUTH
// ═══════════════════════════════════════════════════════
let currentUser = null;
let pinBuffer = '';
let pinTarget = null;

function initAuth() {
  if (typeof USERS === 'undefined' || !USERS.length) {
    document.getElementById('profile-picker').innerHTML =
      '<p style="color:rgba(255,255,255,.8);font-size:14px;text-align:center;grid-column:1/-1">' +
      '⚠️ config.js not found.<br>See README to set up your PIN config.</p>';
    return;
  }
  // Populate profile buttons from USER_PROFILES (names/avatars in code, not secret)
  const grid = document.getElementById('profile-picker');
  grid.innerHTML = '';
  USER_PROFILES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'profile-btn';
    btn.innerHTML = `<div class="avatar">${p.avatar}</div>${p.name}`;
    btn.onclick = () => showPIN(p.name);
    grid.appendChild(btn);
  });

  // Check saved session
  const saved = localStorage.getItem('canada-trip-user');
  if (saved && USER_PROFILES.find(p => p.name === saved)) {
    loginAs(saved);
  }
}

function showProfilePicker() {
  document.getElementById('profile-picker').classList.remove('hidden');
  document.getElementById('pin-panel').classList.add('hidden');
  pinBuffer = '';
  pinTarget = null;
  updateDots();
}

function showPIN(name) {
  // Look up the PIN record from config.js by name
  pinTarget = (USERS || []).find(u => u.name === name) || { name, pin: null };
  pinBuffer = '';
  document.getElementById('pin-user-name').textContent = name;
  document.getElementById('pin-error').textContent = '';
  document.getElementById('profile-picker').classList.add('hidden');
  document.getElementById('pin-panel').classList.remove('hidden');
  updateDots();
}

function pinKey(k) {
  if (k === 'del') { pinBuffer = ''; }
  else if (k === 'clear') { pinBuffer = pinBuffer.slice(0, -1); }
  else if (pinBuffer.length < 4) { pinBuffer += k; }
  updateDots();
  if (pinBuffer.length === 4) checkPIN();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function checkPIN() {
  if (pinBuffer === pinTarget.pin) {
    localStorage.setItem('canada-trip-user', pinTarget.name);
    loginAs(pinTarget.name);
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect PIN — try again';
    pinBuffer = '';
    setTimeout(() => updateDots(), 50);
  }
}

function loginAs(name) {
  currentUser = name;
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  document.getElementById('topbar-sub').textContent = `Logged in as ${name}`;
  document.getElementById('settings-user').textContent = name;
  initApp();
}

//  GEOLOCATION
// ═══════════════════════════════════════════════════════
let currentCoords = null;
let currentPlaceName = null;

function startGPS() {
  currentCoords = null;
  currentPlaceName = null;
  document.getElementById('s-loc-status').textContent = 'Fetching location…';
  if (!navigator.geolocation) {
    document.getElementById('s-loc-status').textContent = 'GPS not available';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      document.getElementById('s-loc-status').textContent =
        `${currentCoords.lat.toFixed(4)}, ${currentCoords.lng.toFixed(4)}`;
      // Reverse geocode
      try {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${currentCoords.lat}&lon=${currentCoords.lng}&format=json`
        );
        const j = await r.json();
        const town = j.address?.town || j.address?.city || j.address?.village || j.address?.county || '';
        const road = j.address?.road || '';
        currentPlaceName = [road, town].filter(Boolean).join(', ') || null;
        document.getElementById('s-loc-status').textContent = currentPlaceName || `${currentCoords.lat.toFixed(4)}, ${currentCoords.lng.toFixed(4)}`;
      } catch {}
    },
    err => {
      document.getElementById('s-loc-status').textContent = 'Location unavailable';
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

// ═══════════════════════════════════════════════════════
let sightings = [];

function initWildlife() {
  // Populate select
  const sel = document.getElementById('s-animal');
  sel.innerHTML = '<option value="">Select animal…</option>';
  ANIMALS.forEach(a => {
    const o = document.createElement('option');
    o.value = a; o.textContent = a;
    sel.appendChild(o);
  });
  sel.onchange = () => {
    document.getElementById('s-other-group').style.display =
      sel.value === 'Other' ? 'block' : 'none';
  };

  // Listen to Firestore
  db.collection('sightings').orderBy('timestamp', 'desc').onSnapshot(snap => {
    sightings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderSightings();
  });
}

function renderSightings() {
  renderSpeciesSummary();
  const list = document.getElementById('sightings-list');
  if (!sightings.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔭</div><p>No sightings yet — be the first to spot something!</p></div>`;
    return;
  }
  list.innerHTML = sightings.map(s => {
    const animal = s.otherAnimal || s.animal;
    const emoji = ANIMAL_EMOJI[s.animal] || '🐾';
    const time = s.timestamp ? formatTime(s.timestamp.toDate ? s.timestamp.toDate() : new Date(s.timestamp)) : '';
    const loc = s.placeName || (s.coords ? `${s.coords.lat.toFixed(3)}, ${s.coords.lng.toFixed(3)}` : 'Unknown location');
    return `
      <div class="sighting-card">
        <div class="animal-row">
          <span class="animal-emoji">${emoji}</span>
          <span class="animal-name">${animal}</span>
        </div>
        <div class="sighting-meta">
          <span>👤 ${s.loggedBy || '?'}</span>
          <span>🕐 ${time}</span>
          <span>📍 ${loc}</span>
        </div>
        ${s.notes ? `<div class="sighting-notes">"${s.notes}"</div>` : ''}
      </div>`;
  }).join('');
}

function renderSpeciesSummary() {
  const counts = {};
  sightings.forEach(s => {
    const k = s.otherAnimal || s.animal || '?';
    counts[k] = (counts[k] || 0) + 1;
  });
  const el = document.getElementById('species-summary');
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (!entries.length) { el.innerHTML = '<span style="color:var(--text-m);font-size:13px">No sightings yet</span>'; return; }
  el.innerHTML = entries.map(([animal, count]) => `
    <div class="species-chip">
      ${ANIMAL_EMOJI[animal] || '🐾'} ${animal}
      <span class="chip-count">${count}</span>
    </div>`).join('');
}

async function submitSighting() {
  const animal = document.getElementById('s-animal').value;
  if (!animal) { showToast('Please select an animal'); return; }
  const otherAnimal = animal === 'Other' ? document.getElementById('s-other').value.trim() : null;
  if (animal === 'Other' && !otherAnimal) { showToast('Please specify the animal'); return; }

  const data = {
    animal,
    otherAnimal: otherAnimal || null,
    notes: document.getElementById('s-notes').value.trim() || null,
    coords: currentCoords,
    placeName: currentPlaceName,
    loggedBy: currentUser,
    timestamp: new Date().toISOString(),
  };

  closeModal('modal-sighting');
  showToast('Sighting logged! 🐾');

  if (isOnline) {
    try {
      await db.collection('sightings').add({ ...data, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    } catch {
      await idbPut({ collection: 'sightings', data });
      updateQueueCount();
    }
  } else {
    await idbPut({ collection: 'sightings', data });
    updateQueueCount();
    showToast('Saved offline — will sync later');
  }
}

// ═══════════════════════════════════════════════════════
//  DIRECTORY FEATURE
// ═══════════════════════════════════════════════════════
let directory = [];
let dirCityFilter = 'All';
let dirCatFilter = 'All';
let dirRating = 0;

function initDirectory() {
  // City filter chips
  const cityRow = document.getElementById('city-filters');
  ['All', ...CITIES].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (c === 'All' ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => {
      dirCityFilter = c;
      cityRow.querySelectorAll('.filter-chip').forEach(b => b.classList.toggle('active', b.textContent === c));
      renderDirectory();
    };
    cityRow.appendChild(btn);
  });

  // Category filter chips
  const catRow = document.getElementById('cat-filters');
  ['All', ...CATEGORIES].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (c === 'All' ? ' active' : '');
    btn.textContent = c === 'All' ? c : (CAT_EMOJI[c] || '') + ' ' + c;
    btn.onclick = () => {
      dirCatFilter = c;
      catRow.querySelectorAll('.filter-chip').forEach(b =>
        b.classList.toggle('active', b.dataset.val === c));
      renderDirectory();
    };
    btn.dataset.val = c;
    catRow.appendChild(btn);
  });

  // Populate modal selects
  const citySelect = document.getElementById('d-city');
  CITIES.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; citySelect.appendChild(o); });
  const catSelect = document.getElementById('d-cat');
  CATEGORIES.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSelect.appendChild(o); });

  // Listen to Firestore
  db.collection('directory').onSnapshot(snap => {
    directory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderDirectory();
  });
}

function renderDirectory() {
  const list = document.getElementById('directory-list');
  let items = directory;
  if (dirCityFilter !== 'All') items = items.filter(i => i.city === dirCityFilter);
  if (dirCatFilter !== 'All')  items = items.filter(i => i.category === dirCatFilter);

  // Sort: city alphabetical, then rating desc
  items = items.slice().sort((a, b) => {
    const ci = CITIES.indexOf(a.city) - CITIES.indexOf(b.city);
    if (ci !== 0) return ci;
    return (b.rating || 0) - (a.rating || 0);
  });

  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺️</div><p>No places here yet — add one!</p></div>`;
    return;
  }

  // Group by city
  const byCity = {};
  items.forEach(i => { (byCity[i.city] = byCity[i.city] || []).push(i); });
  list.innerHTML = Object.entries(byCity).map(([city, places]) => `
    <div class="dir-city-header">📍 ${city}</div>
    ${places.map(p => `
      <div class="dir-card">
        <div class="dir-card-top">
          <div class="dir-card-icon">${CAT_EMOJI[p.category] || '📌'}</div>
          <div>
            <div class="dir-card-name">${p.name}</div>
            <div class="dir-card-cat">${p.category}</div>
          </div>
        </div>
        <div class="dir-card-meta">
          ${p.rating ? `<span class="stars">${'⭐'.repeat(p.rating)}</span>` : ''}
          ${p.address ? `<span>📌 ${p.address}</span>` : ''}
          <span>👤 ${p.addedBy || '?'}</span>
        </div>
        ${p.notes ? `<div class="dir-card-notes">"${p.notes}"</div>` : ''}
      </div>`).join('')}
  `).join('');
}

function setStar(n) {
  dirRating = n;
  document.querySelectorAll('.star-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.v) <= n);

async function submitDirectory() {
  const name = document.getElementById('d-name').value.trim();
  if (!name) { showToast('Please enter a place name'); return; }

  const data = {
    name,
    city: document.getElementById('d-city').value,

  closeModal('modal-directory');
  showToast('Place added! 📍');

  if (isOnline) {
    try {
      await db.collection('directory').add({ ...data, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    } catch {
      await idbPut({ collection: 'directory', data });
      updateQueueCount();
    }
  } else {
    await idbPut({ collection: 'directory', data });
    updateQueueCount();
    showToast('Saved offline — will sync later');
  }
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function formatTime(date) {
  const now = new Date();
  const diff = now - date;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  }
}
